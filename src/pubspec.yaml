name: kachipapa_store
description: "Kachipapa Store — Malawi's Premier Online Marketplace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Google Fonts
  google_fonts: ^6.2.1

  # HTTP client for API calls to NestJS backend
  http: ^1.2.1

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local storage — saves JWT token
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^13.2.0

  # UI helpers
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # IMAGE PICKER — lets admin pick photos from device
  # Works on web (file picker), Android, iOS, desktop
  image_picker: ^1.0.7

  # MIME type detection — needed when sending image to API
  mime: ^1.0.5

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zinthumall_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 6369
      POSTGRES_DB: zinthumall_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zinthumall_network

  app:
    build: .
    container_name: zinthumall_inventory
    environment:
      DATABASE_URL: postgresql://postgres:6369@postgres:5432/zinthumall_db
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - zinthumall_network

networks:
  zinthumall_network:
    driver: bridge

volumes:
  postgres_data: